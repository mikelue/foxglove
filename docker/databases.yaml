services:
  postgres:
    image: postgres:17
    container_name: postgres-17
    restart: unless-stopped
    shm_size: '512mb'
    environment:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev@146
    deploy:
      resources:
        limits:
          memory: 2gb
        reservations:
          memory: 512mb
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dev_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres17_data:/var/lib/postgresql/data
    networks:
      db:
        aliases:
          - postgres-17

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mssql-2025
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "dev@146146"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      db:
        aliases:
          - mssql-2025

  mysql:
    image: mysql:8.0
    container_name: mysql-8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev@146
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass_change_me"]
      interval: 10s
      timeout: 5s
      retries: 5

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-23
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: dev@146
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres17_data:
  mssql_data:
  mysql_data:
  oracle_data:

networks:
  db:
